# Port du serveur de l'application
server.port=8080

# Configuration de la base de données H2 en mémoire
spring.datasource.url=jdbc:h2:mem:securitedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Configuration d'Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Activer la console H2 pour pouvoir inspecter la base : http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
