# Configuration de l'application Spring Boot
# ─────────────────────────────────────────────
#
# Ce fichier configure TOUS les composants de l'application :
# - Le serveur web (Tomcat)
# - La base de données (H2 / PostgreSQL)
# - Hibernate (ORM)
# - Le logging
#
# Spring Boot lit ce fichier au démarrage et configure
# automatiquement les beans en fonction des propriétés.

# ╔═══════════════════════════════════════════╗
# ║           SERVEUR WEB (TOMCAT)            ║
# ╚═══════════════════════════════════════════╝

# Port du serveur (defaut: 8080)
server.port=8080

# ╔═══════════════════════════════════════════╗
# ║         BASE DE DONNEES (H2 en dev)       ║
# ╚═══════════════════════════════════════════╝
#
# H2 est une base EN MEMOIRE parfaite pour le developpement.
# Les donnees sont PERDUES a chaque redemarrage.
#
# En production, remplacer par PostgreSQL :
# spring.datasource.url=jdbc:postgresql://localhost:5432/produits_db
# spring.datasource.username=postgres
# spring.datasource.password=motdepasse
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:h2:mem:produits_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web H2 (accessible a http://localhost:8080/h2-console)
# Utile pour voir les tables et executer du SQL manuellement
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ╔═══════════════════════════════════════════╗
# ║            HIBERNATE (JPA/ORM)            ║
# ╚═══════════════════════════════════════════╝
#
# Hibernate est l'ORM qui fait le pont entre Java et SQL.
# Il convertit les @Entity en tables et les objets en lignes.

# ddl-auto : comment Hibernate gere le schema de la base
# - create      : DROP + CREATE a chaque demarrage (perd les donnees)
# - create-drop : comme create, mais DROP aussi a l'arret
# - update      : modifie le schema sans perdre les donnees
# - validate    : verifie que le schema correspond aux entites (production)
# - none        : ne touche pas au schema (production avec Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=create-drop

# Afficher les requetes SQL generees par Hibernate dans la console
# Tres utile en developpement pour comprendre ce que fait Hibernate
spring.jpa.show-sql=true

# Formater le SQL affiche (plus lisible)
spring.jpa.properties.hibernate.format_sql=true

# Dialecte SQL : indique a Hibernate quelle syntaxe SQL utiliser
# H2 a son propre dialecte ; en production avec PostgreSQL :
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ╔═══════════════════════════════════════════╗
# ║               LOGGING                     ║
# ╚═══════════════════════════════════════════╝

# Niveau de log pour notre application
logging.level.com.exemple.mvcspringboot=DEBUG

# Voir les parametres des requetes SQL (les ? dans les INSERT/SELECT)
logging.level.org.hibernate.orm.jdbc.bind=TRACE
